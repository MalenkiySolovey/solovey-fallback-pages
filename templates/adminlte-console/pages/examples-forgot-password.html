<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Forgot Password</title>
  <link rel="stylesheet" href="../assets/site.css">
</head>
<body>

    <main class="login-box">
      <h1 class="login-logo">
        <a href="/index2/"><b>Admin</b>LTE</a>
      </h1>
      <!-- /.login-logo -->
      <div class="card">
        <div class="card-body login-card-body">
          <p class="login-box-msg">
            You forgot your password? Here you can easily retrieve a new password.
          </p>

          <div class="decoy-form">
            <label class="visually-hidden" for="forgotEmail">Email</label>
            <div class="input-group mb-3">
              <span class="decoy-input" tabindex="0">Email</span>
              <div class="input-group-text">
                <span class="bi bi-envelope"></span>
              </div>
            </div>
            <div class="row">
              <div class="col-12">
                <div class="d-grid gap-2">
                  <button type="submit" class="btn btn-primary">Request new password</button>
                </div>
              </div>
              <!-- /.col -->
            </div>
          </div>

          <p class="mt-3 mb-1">
            <a href="/login/">Login</a>
          </p>
          <p class="mb-0">
            <a href="/register/" class="text-center"> Register a new membership </a>
          </p>
        </div>
        <!-- /.login-card-body -->
      </div>
    </main>
    <!-- /.login-box -->

<div id="decoy-error" class="decoy-error">The request could not be completed. Please check the entered data and try again later.</div>

</body>
</html>
