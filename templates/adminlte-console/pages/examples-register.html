<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Register Page</title>
  <link rel="stylesheet" href="../assets/site.css">
</head>
<body>

    <main class="register-box">
      <h1 class="register-logo">
        <a href="/index2/"><b>Admin</b>LTE</a>
      </h1>
      <!-- /.register-logo -->
      <div class="card">
        <div class="card-body register-card-body">
          <p class="register-box-msg">Register a new membership</p>

          <div class="decoy-form">
            <label class="visually-hidden" for="registerName">Full Name</label>
            <div class="input-group mb-3">
              <span class="decoy-input" tabindex="0">Full Name</span>
              <div class="input-group-text">
                <span class="bi bi-person"></span>
              </div>
            </div>
            <label class="visually-hidden" for="registerEmail">Email</label>
            <div class="input-group mb-3">
              <span class="decoy-input" tabindex="0">Email</span>
              <div class="input-group-text">
                <span class="bi bi-envelope"></span>
              </div>
            </div>
            <label class="visually-hidden" for="registerPassword">Password</label>
            <div class="input-group mb-3">
              <span class="decoy-input" tabindex="0">Password</span>
              <div class="input-group-text">
                <span class="bi bi-lock-fill"></span>
              </div>
            </div>
            <!--begin::Row-->
            <div class="row">
              <div class="col-8">
                <div class="form-check">
                  <span class="decoy-checkbox" tabindex="0"><span>Remember selection</span></span>
                  <label class="form-check-label" for="flexCheckDefault">
                    I agree to the <a href="#">terms</a>
                  </label>
                </div>
              </div>
              <!-- /.col -->
              <div class="col-4">
                <div class="d-grid gap-2">
                  <button type="submit" class="btn btn-primary">Register</button>
                </div>
              </div>
              <!-- /.col -->
            </div>
            <!--end::Row-->
          </div>

          <div class="social-auth-links text-center mb-3 d-grid gap-2">
            <p>- OR -</p>
            <a href="#" class="btn btn-primary">
              <i class="bi bi-facebook me-2"></i> Sign up using Facebook
            </a>
            <a href="#" class="btn btn-danger">
              <i class="bi bi-google me-2"></i> Sign up using Google
            </a>
          </div>
          <!-- /.social-auth-links -->

          <p class="mb-0">
            <a href="/login/" class="text-center"> I already have a membership </a>
          </p>
        </div>
        <!-- /.register-card-body -->
      </div>
    </main>
    <!-- /.register-box -->

<div id="decoy-error" class="decoy-error">The request could not be completed. Please check the entered data and try again later.</div>

</body>
</html>
