<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Lockscreen</title>
  <link rel="stylesheet" href="../assets/site.css">
</head>
<body>

    <main class="lockscreen-wrapper">
      <h1 class="lockscreen-logo">
        <a href="/index2/"><b>Admin</b>LTE</a>
      </h1>

      <div class="lockscreen-name">John Doe</div>

      <div class="lockscreen-item">
        <div class="lockscreen-image">
          <img src="../assets/img/user1-128x128.jpg" alt="John Doe" />
        </div>

        <div class="decoy-form">
          <label class="visually-hidden" for="lockscreenPassword">Password</label>
          <div class="input-group">
            <span class="decoy-input" tabindex="0">password</span>
            <div class="input-group-text border-0 bg-transparent px-1">
              <button type="button" class="btn shadow-none" aria-label="Sign in">
                <i class="bi bi-box-arrow-right text-body-secondary"></i>
              </button>
            </div>
          </div>
        </div>
      </div>

      <div class="help-block text-center">Enter your password to retrieve your session</div>
      <div class="text-center">
        <a href="/login/" class="text-decoration-none">Or sign in as a different user</a>
      </div>
      <div class="lockscreen-footer text-center">
        Copyright В© 2014-2026 &nbsp;
        <b
          ><a
            href="https://adminlte.io"
            class="link-primary link-offset-2 link-underline-opacity-25 link-underline-opacity-100-hover"
            >AdminLTE.io</a
          ></b
        >
        <br />
        All rights reserved
      </div>
    </main>

<div id="decoy-error" class="decoy-error">The request could not be completed. Please check the entered data and try again later.</div>

</body>
</html>
