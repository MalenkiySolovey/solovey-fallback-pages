<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>404 Error Page</title>
  <link rel="stylesheet" href="../assets/site.css">
</head>
<body>

    <main class="d-flex align-items-center min-vh-100 py-5">
      <div class="container">
        <div class="row justify-content-center">
          <div class="col-md-8 col-lg-6 text-center">
            <div class="display-1 fw-bold text-primary lh-1 mb-3">404</div>
            <h1 class="h3 mb-3">Oops! Page not found.</h1>
            <p class="text-secondary mb-4">
              We could not find the page you were looking for. Meanwhile, you may return to the
              dashboard or try searching for what you need.
            </p>
            <div class="decoy-form">
              <div class="col-sm-8">
                <div class="input-group">
                  <span class="input-group-text bg-body">
                    <i class="bi bi-search" aria-hidden="true"></i>
                  </span>
                  <span class="decoy-input" tabindex="0">Search…</span>
                </div>
              </div>
              <div class="col-sm-auto">
                <button class="btn btn-primary w-100" type="submit">Search</button>
              </div>
            </div>
            <a href="/index/" class="btn btn-outline-secondary">
              <i class="bi bi-arrow-left me-1" aria-hidden="true"></i>
              Back to dashboard
            </a>
          </div>
        </div>
      </div>
    </main>

<div id="decoy-error" class="decoy-error">The request could not be completed. Please check the entered data and try again later.</div>

</body>
</html>
