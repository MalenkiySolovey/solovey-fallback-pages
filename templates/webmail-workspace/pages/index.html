<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Mailbox Workspace</title>
  <link rel="stylesheet" href="../assets/site.css">
</head>
<body class="surface mail">
  <aside class="sidebar">
    <div class="brand">Northline Mail</div>
    <a class="active" href="/">Inbox</a>
    <a href="/login/">Account</a>
    <a href="/archive/">Archive</a>
  </aside>
  <main class="panel">
    <header class="panel-header">
      <div>
        <h1>Inbox</h1>
        <p>Team messages and delivery reports</p>
      </div>
      <span class="badge">12 unread</span>
    </header>
    <section class="message-list">
      <article>
        <strong>Delivery queue update</strong>
        <span>All regional queues are operating normally.</span>
      </article>
      <article>
        <strong>Storage notification</strong>
        <span>The shared mailbox has 68% of quota available.</span>
      </article>
      <article>
        <strong>Weekly summary</strong>
        <span>Traffic and sync metrics were archived successfully.</span>
      </article>
    </section>
  </main>
</body>
</html>
