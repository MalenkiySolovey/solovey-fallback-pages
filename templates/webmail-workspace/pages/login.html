<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sign in</title>
  <link rel="stylesheet" href="../assets/site.css">
</head>
<body class="surface auth">
  <main class="auth-card">
    <h1>Northline Mail</h1>
    <p>Sign in with your workspace account.</p>
    <section class="credential-preview" aria-label="Sign in preview">
      <div class="field">
        <span>Email</span>
        <strong>name@example.com</strong>
      </div>
      <div class="field">
        <span>Password</span>
        <strong>••••••••••••</strong>
      </div>
      <a class="button-link" href="/">Continue</a>
    </section>
  </main>
</body>
</html>
